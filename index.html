<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Org Chart Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3; --surface: #fff; --surface2: #f0ede4;
    --border: #d4d1c8; --border2: #e0ddd6;
    --text: #1a1a18; --text2: #888780; --text3: #aaa;
    --line: #c0bdb4; --shadow: rgba(0,0,0,0.08);
  }
  body.dark {
    --bg: #1c1c1e; --surface: #2c2c2e; --surface2: #3a3a3c;
    --border: #48484a; --border2: #3a3a3c;
    --text: #f0f0ee; --text2: #9a9a98; --text3: #555;
    --line: #555; --shadow: rgba(0,0,0,0.35);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* TOOLBAR */
  #toolbar {
    background: var(--surface); border-bottom: 1px solid var(--border2);
    padding: 10px 16px; display: flex; align-items: center;
    gap: 12px; flex-shrink: 0; flex-wrap: wrap;
  }
  #toolbar h1 { font-size: 15px; font-weight: 600; color: var(--text); margin-right: 4px; }
  .sep { width: 1px; height: 24px; background: var(--border2); }

  button {
    font-family: inherit; font-size: 13px; padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    cursor: pointer; display: flex; align-items: center;
    gap: 6px; transition: background 0.1s; white-space: nowrap;
  }
  button:hover { background: var(--surface2); }
  button.primary { background: #378add; color: #fff; border-color: #378add; }
  button.primary:hover { background: #2a6ab0; }
  button.danger { color: #e05555; border-color: #c08080; }
  button.danger:hover { background: rgba(224,85,85,0.1); }

  #chart-title-input {
    font-family: inherit; font-size: 14px; font-weight: 500;
    border: none; background: transparent; color: var(--text);
    outline: none; min-width: 120px; max-width: 220px;
  }
  #chart-title-input:focus { border-bottom: 1.5px solid var(--text2); }

  /* CANVAS */
  #canvas-wrap { flex: 1; overflow: auto; position: relative; }
  #canvas { position: relative; min-width: 100%; min-height: 100%; }
  svg#lines {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; pointer-events: none; overflow: visible;
  }

  /* NODES */
  .node {
    position: absolute; background: var(--surface);
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 10px 14px; min-width: 140px; max-width: 200px;
    cursor: grab; user-select: none;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .node:hover { border-color: var(--text2); box-shadow: 0 2px 8px var(--shadow); }
  .node.selected { border-color: #3b6d11; box-shadow: 0 0 0 3px #d4e9b8; }
  .node.dragging { box-shadow: 0 6px 20px var(--shadow); opacity: 0.92; cursor: grabbing; z-index: 1000; }

  .node-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    outline: none; width: 100%; border: none;
    background: transparent; font-family: inherit; cursor: text;
  }
  .node-role {
    font-size: 11px; color: var(--text2); margin-top: 2px;
    outline: none; width: 100%; border: none;
    background: transparent; font-family: inherit; cursor: text;
  }
  .node-name:focus, .node-role:focus { background: rgba(128,128,128,0.1); border-radius: 3px; }

  .node-actions { display: none; margin-top: 8px; gap: 4px; flex-wrap: wrap; }
  .node:hover .node-actions, .node.selected .node-actions { display: flex; }

  .node-btn {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); cursor: pointer; font-family: inherit; transition: background 0.1s;
  }
  .node-btn:hover { background: var(--border); }
  .node-btn.del { color: #e05555; border-color: #c08080; }
  .node-btn.del:hover { background: rgba(224,85,85,0.1); }

  /* reparent port */
  .node-port {
    position: absolute; width: 11px; height: 11px; border-radius: 50%;
    background: var(--surface); border: 2px solid var(--text2);
    cursor: crosshair; opacity: 0; transition: opacity 0.15s;
    z-index: 10; top: -6px; left: 50%; transform: translateX(-50%);
  }
  .node:hover .node-port, .node.selected .node-port { opacity: 1; }
  .node.drop-target  { border-color: #378add !important; box-shadow: 0 0 0 3px rgba(55,138,221,0.3) !important; }
  .node.multi-selected { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.3); }

  #rubber-band {
    position: absolute; border: 1.5px dashed #378add;
    background: rgba(55,138,221,0.07); pointer-events: none; z-index: 300; border-radius: 3px;
  }

  #multi-action {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a18; color: #fff; border-radius: 10px;
    padding: 8px 8px 8px 16px; font-size: 13px;
    display: none; align-items: center; gap: 8px;
    z-index: 700; box-shadow: 0 4px 20px rgba(0,0,0,0.4); white-space: nowrap;
  }
  body.dark #multi-action { background: #3a3a3c; border: 1px solid #555; }
  #multi-action button {
    font-size: 12px; padding: 5px 12px; border-radius: 6px; border: none;
    background: rgba(255,255,255,0.15); color: #fff; cursor: pointer;
  }
  #multi-action button:hover { background: rgba(255,255,255,0.25); }
  #multi-action button.ma-close { padding: 5px 8px; background: transparent; color: #aaa; }
  #multi-action button.ma-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* color bar */
  .node-color-bar { height: 3px; margin: -10px -14px 8px; border-radius: 6px 6px 0 0; }

  /* CALLOUTS */
  .callout {
    position: absolute; border-radius: 8px; display: flex; flex-direction: column;
    z-index: 200; box-shadow: 0 2px 8px var(--shadow); overflow: hidden; user-select: none;
  }
  .callout.selected { box-shadow: 0 0 0 3px rgba(55,138,221,0.4) !important; }
  .callout-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px; cursor: grab; flex-shrink: 0; gap: 4px;
  }
  .callout-header:active { cursor: grabbing; }
  .callout-color-dots { display: flex; gap: 4px; align-items: center; }
  .callout-dot {
    width: 12px; height: 12px; border-radius: 50%; cursor: pointer;
    border: 1.5px solid rgba(0,0,0,0.15); transition: transform 0.1s;
  }
  .callout-dot:hover { transform: scale(1.2); }
  .callout-dot.active { border-color: #333; }
  .callout-del {
    font-size: 12px; line-height: 1; padding: 2px 5px; border-radius: 4px;
    border: none; background: transparent; color: #999; cursor: pointer; margin-left: auto;
  }
  .callout-del:hover { background: rgba(224,85,85,0.2); color: #e05555; }
  .callout-body { flex: 1; display: flex; flex-direction: column; position: relative; min-height: 0; }
  .callout-text {
    flex: 1; border: none; background: transparent; padding: 8px 10px;
    font-family: inherit; font-size: 13px; resize: none; outline: none;
    color: inherit; cursor: text; width: 100%; min-height: 60px;
  }
  .callout-resize {
    position: absolute; bottom: 0; right: 0; width: 14px; height: 14px;
    cursor: se-resize; z-index: 10;
  }
  .callout-resize::after {
    content: ''; position: absolute; bottom: 3px; right: 3px;
    width: 6px; height: 6px;
    border-right: 2px solid rgba(128,128,128,0.4);
    border-bottom: 2px solid rgba(128,128,128,0.4);
  }

  /* PANEL */
  #panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 240px;
    background: var(--surface); border-left: 1px solid var(--border2);
    padding: 16px; overflow-y: auto;
    transform: translateX(100%); transition: transform 0.2s; z-index: 500;
  }
  #panel.open { transform: translateX(0); }
  #panel h2 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; }
  .field-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .field-input {
    width: 100%; font-family: inherit; font-size: 13px;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px; background: var(--surface); color: var(--text); outline: none;
  }
  .field-input:focus { border-color: var(--text2); }

  .color-swatches { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .swatch {
    width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.1s;
  }
  .swatch.active { border-color: var(--text); }

  /* EMPTY STATE */
  #empty {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; color: var(--text3); pointer-events: none;
  }
  #empty p { font-size: 14px; margin-top: 6px; }

  /* ZOOM */
  #zoom-display { font-size: 12px; color: var(--text2); min-width: 36px; text-align: center; }

  .multi-dot {
    width: 12px; height: 12px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.25); transition: transform 0.1s;
  }
  .multi-dot:hover { transform: scale(1.3); }
</style>
</head>
<body class="dark">

<div id="toolbar">
  <h1>&#9660;</h1>
  <input id="chart-title-input" value="My Org Chart" spellcheck="false" />
  <div class="sep"></div>
  <button class="primary" onclick="addRootNode()">+ Add node</button>
  <button onclick="addCallout()">+ Callout</button>
  <button onclick="autoLayout()">Auto layout</button>
  <div class="sep"></div>
  <button onclick="zoomIn()">+</button>
  <span id="zoom-display">100%</span>
  <button onclick="zoomOut()">−</button>
  <button onclick="resetZoom()">Fit</button>
  <div class="sep"></div>
  <button onclick="exportPNG()">Export PNG</button>
  <button onclick="saveJSON()">Save</button>
  <button onclick="document.getElementById('load-input').click()">Load</button>
  <input id="load-input" type="file" accept=".json" style="display:none" onchange="loadJSON(event)">
  <button onclick="undo()">Undo</button>
  <button onclick="toggleDark()" id="dark-btn">☀︎</button>
  <button class="danger" onclick="clearAll()">Clear</button>
</div>

<div id="multi-action">
  <span id="multi-action-label"></span>
  <div style="display:flex;align-items:center;gap:4px;border-right:1px solid rgba(255,255,255,0.15);padding-right:8px;margin-right:2px">
    <span style="font-size:10px;color:rgba(255,255,255,0.45);margin-right:2px">Accent</span>
    <div id="multi-color-dots" style="display:flex;gap:3px"></div>
  </div>
  <div style="display:flex;align-items:center;gap:4px;border-right:1px solid rgba(255,255,255,0.15);padding-right:8px;margin-right:2px">
    <span style="font-size:10px;color:rgba(255,255,255,0.45);margin-right:2px">BG</span>
    <div id="multi-bg-dots" style="display:flex;gap:3px"></div>
  </div>
  <button onclick="dupeMulti()">Duplicate</button>
  <button onclick="deleteMulti()" style="background:rgba(200,60,60,0.3)">Delete</button>
  <button class="ma-close" onclick="clearMultiSelect()">✕</button>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="lines"></svg>
    <div id="empty">
      <div style="font-size:36px">&#9651;</div>
      <p>Click <strong>+ Add node</strong> to start building your tree</p>
    </div>
  </div>
</div>

<div id="panel">
  <h2>Node</h2>
  <div class="field-label">Name</div>
  <input class="field-input" id="panel-name" placeholder="Name" oninput="updateSelectedNode()">
  <div class="field-label">Role / title</div>
  <input class="field-input" id="panel-role" placeholder="Role or title" oninput="updateSelectedNode()">
  <div class="field-label">Accent color</div>
  <div class="color-swatches" id="panel-colors"></div>
  <div class="field-label">Background</div>
  <div class="color-swatches" id="panel-bg-colors"></div>
  <div style="margin-top: 20px; border-top: 1px solid #e0ddd6; padding-top: 14px; display:flex; flex-direction:column; gap:8px;">
    <button onclick="addChildToSelected()">+ Add child node</button>
    <button onclick="dupeSelected()">Duplicate node</button>
    <button class="danger" onclick="deleteSelected()">Delete node</button>
  </div>
</div>

<script>
const COLORS = [
  { name: 'none',   bar: 'transparent' },
  { name: 'blue',   bar: '#378add' },
  { name: 'green',  bar: '#639922' },
  { name: 'amber',  bar: '#ef9f27' },
  { name: 'coral',  bar: '#d85a30' },
  { name: 'purple', bar: '#7f77dd' },
  { name: 'teal',   bar: '#1d9e75' },
  { name: 'pink',   bar: '#d4537e' },
];

const BG_COLORS = [
  { name: 'none',   bg: '#ffffff', bgDark: '#2c2c2e', display: '#f0ede4', displayDark: '#3a3a3c' },
  { name: 'blue',   bg: '#e8f2fc', bgDark: '#152232', display: '#e8f2fc', displayDark: '#1a2d40' },
  { name: 'green',  bg: '#edf6dc', bgDark: '#162210', display: '#edf6dc', displayDark: '#1a2c14' },
  { name: 'amber',  bg: '#fef4e0', bgDark: '#221a08', display: '#fef4e0', displayDark: '#2e230a' },
  { name: 'coral',  bg: '#fdeee8', bgDark: '#221010', display: '#fdeee8', displayDark: '#2e1414' },
  { name: 'purple', bg: '#eeedf9', bgDark: '#1a1830', display: '#eeedf9', displayDark: '#22203e' },
  { name: 'teal',   bg: '#e0f4ee', bgDark: '#0e2420', display: '#e0f4ee', displayDark: '#122e28' },
  { name: 'pink',   bg: '#fce9f0', bgDark: '#221020', display: '#fce9f0', displayDark: '#2e1428' },
];

const CALLOUT_COLORS = [
  { name: 'yellow', bg: '#fffde7', bgDark: '#2a2510', header: '#f0e84a30', border: '#e6d84a', borderDark: '#6a5e10' },
  { name: 'blue',   bg: '#e8f2fc', bgDark: '#0e1f30', header: '#378add25', border: '#8dbfe8', borderDark: '#2a5070' },
  { name: 'green',  bg: '#edf6dc', bgDark: '#0e2010', header: '#63992220', border: '#9ec95a', borderDark: '#2a5020' },
  { name: 'pink',   bg: '#fce9f0', bgDark: '#2a0e18', header: '#d4537e20', border: '#e89bba', borderDark: '#602040' },
  { name: 'purple', bg: '#eeedf9', bgDark: '#180e28', header: '#7f77dd20', border: '#b0acec', borderDark: '#402880' },
  { name: 'white',  bg: '#ffffff', bgDark: '#2c2c2e', header: '#00000008', border: '#d4d1c8', borderDark: '#48484a' },
];

let nodes = [];
let callouts = [];
let selected = null;
let selectedCallout = null;
let selectedSet = new Set();
let undoStack = [];
let zoom = 1;
let nodeCounter = 0;
let calloutCounter = 0;

const canvas = document.getElementById('canvas');
const svg = document.getElementById('lines');
const panel = document.getElementById('panel');
const empty = document.getElementById('empty');

function isDark() { return document.body.classList.contains('dark'); }

function toggleDark() {
  document.body.classList.toggle('dark');
  document.getElementById('dark-btn').textContent = isDark() ? '☀︎' : '☽';
  // refresh bg swatches for current mode
  document.querySelectorAll('#panel-bg-colors .swatch').forEach(s => {
    const c = BG_COLORS.find(x => x.name === s.dataset.bgColor);
    if (c) s.style.background = isDark() ? c.displayDark : c.display;
  });
  render();
  renderCallouts();
}

// Build accent color swatches
const swatchContainer = document.getElementById('panel-colors');
COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'swatch' + (c.name === 'none' ? ' active' : '');
  s.style.background = c.bar === 'transparent' ? '#f0ede4' : c.bar;
  s.style.border = c.name === 'none' ? '2px solid #ccc' : '';
  s.dataset.color = c.name;
  s.onclick = () => setSelectedColor(c.name);
  swatchContainer.appendChild(s);
});

// Build background color swatches
const bgSwatchContainer = document.getElementById('panel-bg-colors');
BG_COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'swatch' + (c.name === 'none' ? ' active' : '');
  s.style.background = isDark() ? c.displayDark : c.display;
  s.style.border = c.name === 'none' ? '2px solid #ccc' : '2px solid transparent';
  s.dataset.bgColor = c.name;
  s.onclick = () => setSelectedBgColor(c.name);
  bgSwatchContainer.appendChild(s);
});

// Build multi-select color dots
const multiColorDots = document.getElementById('multi-color-dots');
COLORS.forEach(c => {
  const d = document.createElement('div');
  d.className = 'multi-dot';
  d.style.background = c.bar === 'transparent' ? '#f0ede4' : c.bar;
  d.title = c.name;
  d.onclick = () => setMultiColor(c.name);
  multiColorDots.appendChild(d);
});
const multiBgDots = document.getElementById('multi-bg-dots');
BG_COLORS.forEach(c => {
  const d = document.createElement('div');
  d.className = 'multi-dot';
  d.style.background = c.display;
  d.title = c.name;
  d.onclick = () => setMultiBgColor(c.name);
  multiBgDots.appendChild(d);
});

// UNDO
function pushUndo() {
  undoStack.push({
    nodes: JSON.parse(JSON.stringify(nodes)),
    callouts: JSON.parse(JSON.stringify(callouts)),
    nodeCounter, calloutCounter,
  });
  if (undoStack.length > 60) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) return;
  const state = undoStack.pop();
  nodes = state.nodes;
  callouts = state.callouts;
  nodeCounter = state.nodeCounter;
  calloutCounter = state.calloutCounter;
  selected = null; selectedCallout = null;
  clearMultiSelect();
  panel.classList.remove('open');
  render();
  renderCallouts();
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();
  }
});

function uid() { return 'n' + (++nodeCounter); }
function cuid() { return 'c' + (++calloutCounter); }

function addRootNode() {
  pushUndo();
  const x = 60 + Math.random() * 300;
  const y = 60 + Math.random() * 200;
  const id = uid();
  nodes.push({ id, name: 'New Node', role: '', x: Math.round(x), y: Math.round(y), color: 'none', bgColor: 'none', parentId: null });
  render();
  selectNode(id);
}

function addChildToSelected() {
  if (!selected) return;
  pushUndo();
  const parent = nodes.find(n => n.id === selected);
  if (!parent) return;
  const id = uid();
  nodes.push({ id, name: 'New Node', role: '', x: parent.x + 60, y: parent.y + 120, color: parent.color, bgColor: parent.bgColor, parentId: parent.id });
  render();
  selectNode(id);
}

function addCallout() {
  const wrap = document.getElementById('canvas-wrap');
  const x = wrap.scrollLeft + 80 + Math.random() * 200;
  const y = wrap.scrollTop + 80 + Math.random() * 120;
  const id = cuid();
  callouts.push({ id, x: Math.round(x), y: Math.round(y), w: 180, h: 120, text: 'Note...', color: 'yellow' });
  renderCallouts();
  expandCanvas();
  selectCallout(id);
}

function deleteSelected() {
  if (!selected) return;
  pushUndo();
  removeNodeAndDescendants(selected);
  selected = null;
  closePanel();
  render();
}

function removeNodeAndDescendants(id) {
  const children = nodes.filter(n => n.parentId === id).map(n => n.id);
  children.forEach(cid => removeNodeAndDescendants(cid));
  nodes = nodes.filter(n => n.id !== id);
}

function clearAll() {
  if (!confirm('Clear all nodes and callouts?')) return;
  pushUndo();
  nodes = []; callouts = []; selected = null; selectedCallout = null;
  closePanel(); render(); renderCallouts();
}

function selectNode(id) {
  selectedCallout = null;
  clearMultiSelect();
  canvas.querySelectorAll('.callout').forEach(el => el.classList.remove('selected'));
  selected = id;
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  document.getElementById('panel-name').value = node.name;
  document.getElementById('panel-role').value = node.role;
  document.querySelectorAll('#panel-colors .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === node.color);
  });
  document.querySelectorAll('#panel-bg-colors .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.bgColor === (node.bgColor || 'none'));
  });
  panel.classList.add('open');
  render();
}

function selectCallout(id) {
  selected = null;
  panel.classList.remove('open');
  canvas.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
  selectedCallout = id;
  canvas.querySelectorAll('.callout').forEach(el => {
    el.classList.toggle('selected', el.dataset.cid === id);
  });
}

function closePanel() {
  panel.classList.remove('open');
  selected = null;
  render();
}

function updateSelectedNode() {
  if (!selected) return;
  const node = nodes.find(n => n.id === selected);
  if (!node) return;
  node.name = document.getElementById('panel-name').value;
  node.role = document.getElementById('panel-role').value;
  render();
}

function setSelectedColor(colorName) {
  if (!selected) return;
  pushUndo();
  const node = nodes.find(n => n.id === selected);
  if (!node) return;
  node.color = colorName;
  document.querySelectorAll('#panel-colors .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === colorName);
  });
  render();
}

function setSelectedBgColor(colorName) {
  if (!selected) return;
  pushUndo();
  const node = nodes.find(n => n.id === selected);
  if (!node) return;
  node.bgColor = colorName;
  document.querySelectorAll('#panel-bg-colors .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.bgColor === colorName);
  });
  render();
}

function getColorBar(colorName) {
  return COLORS.find(c => c.name === colorName)?.bar || 'transparent';
}

function getNodeBg(bgColorName) {
  const c = BG_COLORS.find(x => x.name === bgColorName);
  if (!c) return isDark() ? '#2c2c2e' : '#ffffff';
  return isDark() ? c.bgDark : c.bg;
}

function render() {
  empty.style.display = nodes.length === 0 && callouts.length === 0 ? 'block' : 'none';

  const existing = {};
  canvas.querySelectorAll('.node').forEach(el => existing[el.dataset.id] = el);

  const seen = new Set();
  nodes.forEach(node => {
    seen.add(node.id);
    let el = existing[node.id];
    if (!el) {
      el = createNodeEl(node);
      canvas.appendChild(el);
    }
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.style.background = getNodeBg(node.bgColor || 'none');
    el.classList.toggle('selected', node.id === selected);
    el.classList.toggle('multi-selected', selectedSet.has(node.id));
    el.querySelector('.node-name').value = node.name;
    el.querySelector('.node-role').value = node.role;
    const bar = el.querySelector('.node-color-bar');
    bar.style.background = getColorBar(node.color);
    bar.style.display = node.color === 'none' ? 'none' : 'block';
  });

  Object.keys(existing).forEach(id => {
    if (!seen.has(id)) existing[id].remove();
  });

  drawLines();
  expandCanvas();
}

function renderCallouts() {
  empty.style.display = nodes.length === 0 && callouts.length === 0 ? 'block' : 'none';

  const existingC = {};
  canvas.querySelectorAll('.callout').forEach(el => existingC[el.dataset.cid] = el);

  const seenC = new Set();
  callouts.forEach(co => {
    seenC.add(co.id);
    let el = existingC[co.id];
    if (!el) {
      el = createCalloutEl(co);
      canvas.appendChild(el);
    }
    el.style.left = co.x + 'px';
    el.style.top = co.y + 'px';
    el.style.width = co.w + 'px';
    el.style.height = co.h + 'px';
    el.classList.toggle('selected', co.id === selectedCallout);
    applyCalloutColor(el, co.color);
    el.querySelector('.callout-text').value = co.text;
  });

  Object.keys(existingC).forEach(id => {
    if (!seenC.has(id)) existingC[id].remove();
  });

  expandCanvas();
}

function applyCalloutColor(el, colorName) {
  const c = CALLOUT_COLORS.find(x => x.name === colorName) || CALLOUT_COLORS[0];
  const dark = isDark();
  el.style.background = dark ? c.bgDark : c.bg;
  el.style.borderColor = dark ? c.borderDark : c.border;
  el.style.color = dark ? '#d0d0ce' : '#333';
  const header = el.querySelector('.callout-header');
  if (header) header.style.background = dark ? 'rgba(255,255,255,0.05)' : c.header;
  el.querySelectorAll('.callout-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.cc === colorName);
  });
}

function createCalloutEl(co) {
  const el = document.createElement('div');
  el.className = 'callout';
  el.dataset.cid = co.id;

  const dotsHtml = CALLOUT_COLORS.map(c =>
    `<div class="callout-dot${c.name === co.color ? ' active' : ''}" data-cc="${c.name}" style="background:${c.bg};border-color:${c.border}" title="${c.name}"></div>`
  ).join('');

  el.innerHTML = `
    <div class="callout-header">
      <div class="callout-color-dots">${dotsHtml}</div>
      <button class="callout-del" title="Delete">✕</button>
    </div>
    <div class="callout-body">
      <textarea class="callout-text" placeholder="Add a note...">${esc(co.text)}</textarea>
      <div class="callout-resize"></div>
    </div>
  `;

  // drag from header
  el.querySelector('.callout-header').addEventListener('mousedown', e => {
    if (e.target.classList.contains('callout-del') || e.target.classList.contains('callout-dot')) return;
    e.preventDefault();
    selectCallout(co.id);
    startCalloutDrag(e, co, el);
  });

  // color dots
  el.querySelectorAll('.callout-dot').forEach(dot => {
    dot.addEventListener('click', e => {
      e.stopPropagation();
      co.color = dot.dataset.cc;
      applyCalloutColor(el, co.color);
      selectCallout(co.id);
    });
  });

  // delete
  el.querySelector('.callout-del').addEventListener('click', e => {
    e.stopPropagation();
    pushUndo();
    callouts = callouts.filter(c => c.id !== co.id);
    el.remove();
    if (selectedCallout === co.id) selectedCallout = null;
    empty.style.display = nodes.length === 0 && callouts.length === 0 ? 'block' : 'none';
  });

  // resize
  el.querySelector('.callout-resize').addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    selectCallout(co.id);
    startCalloutResize(e, co, el);
  });

  // textarea — sync text, prevent drag propagation
  const ta = el.querySelector('.callout-text');
  ta.addEventListener('input', () => { co.text = ta.value; });
  ta.addEventListener('mousedown', e => e.stopPropagation());
  ta.addEventListener('focus', () => selectCallout(co.id));

  el.addEventListener('mousedown', e => {
    if (e.target === el) selectCallout(co.id);
  });

  return el;
}

function startCalloutDrag(e, co, el) {
  const startX = e.clientX, startY = e.clientY;
  const startCX = co.x, startCY = co.y;
  el.style.cursor = 'grabbing';
  let moved = false;
  pushUndo();

  function onMove(ev) {
    moved = true;
    co.x = Math.round(startCX + (ev.clientX - startX) / zoom);
    co.y = Math.round(startCY + (ev.clientY - startY) / zoom);
    el.style.left = co.x + 'px';
    el.style.top = co.y + 'px';
    expandCanvas();
  }
  function onUp() {
    if (!moved) undoStack.pop();
    el.style.cursor = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startCalloutResize(e, co, el) {
  const startX = e.clientX, startY = e.clientY;
  const startW = co.w, startH = co.h;

  function onMove(ev) {
    co.w = Math.max(120, Math.round(startW + (ev.clientX - startX) / zoom));
    co.h = Math.max(80, Math.round(startH + (ev.clientY - startY) / zoom));
    el.style.width = co.w + 'px';
    el.style.height = co.h + 'px';
    expandCanvas();
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function createNodeEl(node) {
  const el = document.createElement('div');
  el.className = 'node';
  el.dataset.id = node.id;
  el.innerHTML = `
    <div class="node-color-bar"></div>
    <input class="node-name" value="${esc(node.name)}" placeholder="Name" />
    <input class="node-role" value="${esc(node.role)}" placeholder="Role" />
    <div class="node-actions">
      <button class="node-btn" data-action="add-child">+ Child</button>
      <button class="node-btn" data-action="dupe">Dupe</button>
      <button class="node-btn del" data-action="delete">Delete</button>
    </div>
  `;

  // reparent port dot
  const port = document.createElement('div');
  port.className = 'node-port';
  port.title = 'Drag to reparent';
  port.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    startReparentDrag(e, node.id);
  });
  el.appendChild(port);

  el.addEventListener('mousedown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    if (e.target === port) return;
    startDrag(e, node.id);
  });

  el.querySelector('.node-name').addEventListener('input', e => {
    node.name = e.target.value;
    drawLines();
  });
  el.querySelector('.node-role').addEventListener('input', e => {
    node.role = e.target.value;
  });
  el.querySelector('.node-name').addEventListener('focus', () => selectNode(node.id));
  el.querySelector('.node-role').addEventListener('focus', () => selectNode(node.id));

  el.addEventListener('click', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.target.dataset.action === 'add-child') { selectNode(node.id); addChildToSelected(); return; }
    if (e.target.dataset.action === 'dupe') { selectNode(node.id); dupeNode(node.id); return; }
    if (e.target.dataset.action === 'delete') { selectNode(node.id); deleteSelected(); return; }
    selectNode(node.id);
  });

  return el;
}

// MULTI-SELECT
function clearMultiSelect() {
  selectedSet = new Set();
  document.getElementById('multi-action').style.display = 'none';
}

function showMultiAction() {
  const bar = document.getElementById('multi-action');
  document.getElementById('multi-action-label').textContent = selectedSet.size + ' nodes selected';
  bar.style.display = 'flex';
}

function setMultiColor(colorName) {
  if (selectedSet.size === 0) return;
  pushUndo();
  selectedSet.forEach(id => { const n = nodes.find(x => x.id === id); if (n) n.color = colorName; });
  render();
}

function setMultiBgColor(colorName) {
  if (selectedSet.size === 0) return;
  pushUndo();
  selectedSet.forEach(id => { const n = nodes.find(x => x.id === id); if (n) n.bgColor = colorName; });
  render();
}

function findEmptySpace(dupeIds) {
  const dupeNodes = dupeIds.map(id => nodes.find(n => n.id === id)).filter(Boolean);
  if (dupeNodes.length === 0) return;
  const EST = 170;
  const GAP = 60;
  const minX = Math.min(...dupeNodes.map(n => n.x));
  const minY = Math.min(...dupeNodes.map(n => n.y));
  const otherNodes = nodes.filter(n => !dupeIds.includes(n.id));
  let rightmost = 60;
  otherNodes.forEach(n => {
    const el = canvas.querySelector(`[data-id="${n.id}"]`);
    rightmost = Math.max(rightmost, n.x + (el ? el.offsetWidth : EST));
  });
  const dx = rightmost + GAP - minX;
  dupeNodes.forEach(n => { n.x = Math.round(n.x + dx); });
}

function dupeMulti() {
  if (selectedSet.size === 0) return;
  pushUndo();
  const idMap = {};
  selectedSet.forEach(id => {
    const src = nodes.find(n => n.id === id);
    if (!src) return;
    const newId = uid();
    idMap[id] = newId;
    nodes.push({ ...src, id: newId }); // same position as original — findEmptySpace will relocate
  });
  Object.entries(idMap).forEach(([, newId]) => {
    const newNode = nodes.find(n => n.id === newId);
    if (newNode && newNode.parentId && idMap[newNode.parentId]) {
      newNode.parentId = idMap[newNode.parentId];
    }
  });
  const newIds = Object.values(idMap);
  selectedSet = new Set(newIds);
  render(); // render first so offsetWidths are available
  findEmptySpace(newIds);
  render(); // re-render at relocated positions
  showMultiAction();
}

function deleteMulti() {
  if (selectedSet.size === 0) return;
  pushUndo();
  selectedSet.forEach(id => { nodes = nodes.filter(n => n.id !== id); });
  nodes.forEach(n => { if (n.parentId && !nodes.find(p => p.id === n.parentId)) n.parentId = null; });
  clearMultiSelect();
  render();
}

function startRubberBand(e) {
  const wrap = document.getElementById('canvas-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const toCanvas = (cx, cy) => ({
    x: (cx - wrapRect.left + wrap.scrollLeft) / zoom,
    y: (cy - wrapRect.top  + wrap.scrollTop)  / zoom,
  });
  const start = toCanvas(e.clientX, e.clientY);
  let end = { ...start };

  const rbEl = document.createElement('div');
  rbEl.id = 'rubber-band';
  canvas.appendChild(rbEl);

  function updateRect() {
    const rx = Math.min(start.x, end.x), ry = Math.min(start.y, end.y);
    const rw = Math.abs(end.x - start.x), rh = Math.abs(end.y - start.y);
    rbEl.style.cssText = `left:${rx}px;top:${ry}px;width:${rw}px;height:${rh}px`;
    return { rx, ry, rw, rh };
  }

  function onMove(ev) {
    end = toCanvas(ev.clientX, ev.clientY);
    updateRect();
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const { rx, ry, rw, rh } = updateRect();
    rbEl.remove();

    if (rw < 5 && rh < 5) {
      // treat as plain click — clear everything
      clearMultiSelect();
      selected = null; selectedCallout = null;
      closePanel();
      render();
      canvas.querySelectorAll('.callout').forEach(el => el.classList.remove('selected'));
      return;
    }

    const hit = new Set();
    nodes.forEach(node => {
      const el = canvas.querySelector(`[data-id="${node.id}"]`);
      if (!el) return;
      const nw = el.offsetWidth, nh = el.offsetHeight;
      if (node.x < rx + rw && node.x + nw > rx && node.y < ry + rh && node.y + nh > ry) {
        hit.add(node.id);
      }
    });

    if (hit.size > 0) {
      selected = null;
      panel.classList.remove('open');
      selectedSet = hit;
      render();
      showMultiAction();
    } else {
      clearMultiSelect();
    }
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// DUPLICATE
function dupeNode(id) {
  pushUndo();
  const src = nodes.find(n => n.id === id);
  if (!src) return;
  const newId = uid();
  nodes.push({ ...src, id: newId, x: src.x + 30, y: src.y + 30 });
  render();
  selectNode(newId);
}

function dupeSelected() {
  if (selected) dupeNode(selected);
}

// REPARENT by dragging the port dot
function startReparentDrag(e, nodeId) {
  const node = nodes.find(n => n.id === nodeId);
  const origParentId = node.parentId;
  pushUndo();
  const el = canvas.querySelector(`[data-id="${nodeId}"]`);

  const ghostPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  ghostPath.setAttribute('stroke', '#378add');
  ghostPath.setAttribute('stroke-width', '2');
  ghostPath.setAttribute('stroke-dasharray', '6 3');
  ghostPath.setAttribute('fill', 'none');
  ghostPath.setAttribute('opacity', '0.8');
  svg.appendChild(ghostPath);

  let currentTarget = null;

  function canvasPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return { x: (clientX - rect.left) / zoom, y: (clientY - rect.top) / zoom };
  }

  function onMove(ev) {
    const pos = canvasPos(ev.clientX, ev.clientY);
    const srcX = node.x + el.offsetWidth / 2;
    const srcY = node.y;
    const my = (srcY + pos.y) / 2;
    ghostPath.setAttribute('d', `M ${pos.x} ${pos.y} C ${pos.x} ${my}, ${srcX} ${my}, ${srcX} ${srcY}`);

    const elemBelow = document.elementFromPoint(ev.clientX, ev.clientY);
    const nodeBelow = elemBelow?.closest('.node');
    const belowId = nodeBelow?.dataset?.id;

    if (currentTarget !== belowId) {
      if (currentTarget) canvas.querySelector(`[data-id="${currentTarget}"]`)?.classList.remove('drop-target');
      currentTarget = null;
      if (nodeBelow && belowId !== nodeId && !isDescendantOf(belowId, nodeId)) {
        currentTarget = belowId;
        nodeBelow.classList.add('drop-target');
      }
    }
  }

  function onUp(ev) {
    ghostPath.remove();
    if (currentTarget) canvas.querySelector(`[data-id="${currentTarget}"]`)?.classList.remove('drop-target');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);

    const elemBelow = document.elementFromPoint(ev.clientX, ev.clientY);
    const nodeBelow = elemBelow?.closest('.node');
    const belowId = nodeBelow?.dataset?.id;

    if (belowId && belowId !== nodeId && !isDescendantOf(belowId, nodeId)) {
      node.parentId = belowId;
    } else if (!nodeBelow) {
      node.parentId = null;
    }
    if (node.parentId === origParentId) undoStack.pop(); // no change
    render();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// returns true if checkId is a descendant of ancestorId
function isDescendantOf(checkId, ancestorId) {
  let cur = nodes.find(n => n.id === checkId);
  while (cur) {
    if (cur.parentId === ancestorId) return true;
    cur = nodes.find(n => n.id === cur.parentId);
  }
  return false;
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function drawLines() {
  svg.innerHTML = '';
  nodes.forEach(node => {
    if (!node.parentId) return;
    const parent = nodes.find(n => n.id === node.parentId);
    if (!parent) return;
    const pEl = canvas.querySelector(`[data-id="${parent.id}"]`);
    const cEl = canvas.querySelector(`[data-id="${node.id}"]`);
    if (!pEl || !cEl) return;

    const px = parent.x + pEl.offsetWidth / 2;
    const py = parent.y + pEl.offsetHeight;
    const cx = node.x + cEl.offsetWidth / 2;
    const cy = node.y;

    const d = computeEdgePath(px, py, cx, cy, node.id, parent.id);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('stroke', isDark() ? '#555' : '#c0bdb4');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    svg.appendChild(path);
  });
}

function computeEdgePath(px, py, cx, cy, skipId, skipParentId) {
  const M = 10; // margin around nodes
  const R = 6;  // corner radius

  if (Math.abs(cx - px) < 2) return `M ${px} ${py} L ${cx} ${cy}`;

  const minX = Math.min(px, cx) - M;
  const maxX = Math.max(px, cx) + M;

  // Collect Y-intervals of nodes strictly between parent-bottom and child-top
  // whose X-range overlaps the horizontal segment
  const intervals = [];
  for (const n of nodes) {
    if (n.id === skipId || n.id === skipParentId) continue;
    const el = canvas.querySelector(`[data-id="${n.id}"]`);
    if (!el) continue;
    const nTop = n.y, nBot = n.y + el.offsetHeight;
    // Only consider nodes that actually sit in the vertical gap between parent and child
    if (nBot <= py || nTop >= cy) continue;
    if (n.x - M < maxX && n.x + el.offsetWidth + M > minX) {
      intervals.push([nTop - M, nBot + M]);
    }
  }
  intervals.sort((a, b) => a[0] - b[0]);

  // Start just below parent and scan forward, jumping over any blocking node
  let midY = py + R + 4;
  for (const [bTop, bBot] of intervals) {
    if (midY > bTop && midY < bBot) midY = bBot + 4;
    if (midY <= bTop) break;
  }
  midY = Math.max(py + R + 4, Math.min(midY, cy - R - 4));

  const dir = cx > px ? 1 : -1;
  return [
    `M ${px} ${py}`,
    `L ${px} ${midY - R}`,
    `Q ${px} ${midY} ${px + dir * R} ${midY}`,
    `L ${cx - dir * R} ${midY}`,
    `Q ${cx} ${midY} ${cx} ${midY + R}`,
    `L ${cx} ${cy}`,
  ].join(' ');
}

function expandCanvas() {
  let maxX = 400, maxY = 400;
  nodes.forEach(n => {
    const el = canvas.querySelector(`[data-id="${n.id}"]`);
    if (el) {
      maxX = Math.max(maxX, n.x + el.offsetWidth + 80);
      maxY = Math.max(maxY, n.y + el.offsetHeight + 80);
    }
  });
  callouts.forEach(co => {
    maxX = Math.max(maxX, co.x + co.w + 80);
    maxY = Math.max(maxY, co.y + co.h + 80);
  });
  canvas.style.width = maxX + 'px';
  canvas.style.height = maxY + 'px';
}

// SNAPPING
const SNAP_GRID = 10;
const SNAP_GAP = 8;
const SNAP_THRESH = 14;

function snapPos(rawX, rawY, movingId) {
  const el = canvas.querySelector(`[data-id="${movingId}"]`);
  const w = el ? el.offsetWidth : 160;
  const h = el ? el.offsetHeight : 60;

  let bx = { val: Math.round(rawX / SNAP_GRID) * SNAP_GRID, dist: SNAP_THRESH + 1 };
  let by = { val: Math.round(rawY / SNAP_GRID) * SNAP_GRID, dist: SNAP_THRESH + 1 };

  nodes.forEach(other => {
    if (other.id === movingId) return;
    const oEl = canvas.querySelector(`[data-id="${other.id}"]`);
    if (!oEl) return;
    const ow = oEl.offsetWidth, oh = oEl.offsetHeight;

    [other.x + ow + SNAP_GAP, other.x - w - SNAP_GAP, other.x + (ow - w) / 2].forEach(c => {
      const d = Math.abs(rawX - c);
      if (d < SNAP_THRESH && d < bx.dist) bx = { val: c, dist: d };
    });
    [other.y + oh + SNAP_GAP, other.y - h - SNAP_GAP, other.y + (oh - h) / 2].forEach(c => {
      const d = Math.abs(rawY - c);
      if (d < SNAP_THRESH && d < by.dist) by = { val: c, dist: d };
    });
  });

  return { x: Math.round(bx.val), y: Math.round(by.val) };
}

// GROUP DRAG
function startGroupDrag(e, anchorId) {
  e.preventDefault();
  pushUndo();
  const startX = e.clientX, startY = e.clientY;
  const startPositions = {};
  selectedSet.forEach(id => {
    const n = nodes.find(x => x.id === id);
    if (n) startPositions[id] = { x: n.x, y: n.y };
  });
  let moved = false;

  selectedSet.forEach(id => canvas.querySelector(`[data-id="${id}"]`)?.classList.add('dragging'));

  function onMove(ev) {
    moved = true;
    const dx = (ev.clientX - startX) / zoom;
    const dy = (ev.clientY - startY) / zoom;
    selectedSet.forEach(id => {
      const n = nodes.find(x => x.id === id);
      const el = canvas.querySelector(`[data-id="${id}"]`);
      if (!n || !el) return;
      n.x = Math.round(startPositions[id].x + dx);
      n.y = Math.round(startPositions[id].y + dy);
      el.style.left = n.x + 'px';
      el.style.top = n.y + 'px';
    });
    drawLines();
    expandCanvas();
  }

  function onUp() {
    if (!moved) undoStack.pop();
    selectedSet.forEach(id => canvas.querySelector(`[data-id="${id}"]`)?.classList.remove('dragging'));
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// DRAG (nodes)
function startDrag(e, nodeId) {
  e.preventDefault();

  // If node is in multi-select group, drag the whole group
  if (selectedSet.has(nodeId) && selectedSet.size > 1) {
    startGroupDrag(e, nodeId);
    return;
  }

  const node = nodes.find(n => n.id === nodeId);
  const el = canvas.querySelector(`[data-id="${nodeId}"]`);
  el.classList.add('dragging');
  selectNode(nodeId);
  pushUndo();

  const startX = e.clientX, startY = e.clientY;
  const startNodeX = node.x, startNodeY = node.y;
  let moved = false;

  function onMove(ev) {
    moved = true;
    const rawX = startNodeX + (ev.clientX - startX) / zoom;
    const rawY = startNodeY + (ev.clientY - startY) / zoom;
    const snapped = snapPos(rawX, rawY, nodeId);
    node.x = snapped.x;
    node.y = snapped.y;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    drawLines();
    expandCanvas();
  }

  function onUp() {
    if (!moved) undoStack.pop();
    el.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ZOOM
function applyZoom() {
  canvas.style.transform = `scale(${zoom})`;
  canvas.style.transformOrigin = '0 0';
  document.getElementById('zoom-display').textContent = Math.round(zoom * 100) + '%';
}
function zoomIn() { zoom = Math.min(zoom + 0.1, 2); applyZoom(); }
function zoomOut() { zoom = Math.max(zoom - 0.1, 0.3); applyZoom(); }
function resetZoom() { zoom = 1; applyZoom(); }

// AUTO LAYOUT
function autoLayout() {
  const roots = nodes.filter(n => !n.parentId);
  if (roots.length === 0) return;

  const HGAP = 40, VGAP = 100, NODE_W = 160;

  function subtreeWidth(id) {
    const children = nodes.filter(n => n.parentId === id);
    if (children.length === 0) return NODE_W;
    return children.reduce((sum, c) => sum + subtreeWidth(c.id), 0) + HGAP * (children.length - 1);
  }

  function place(id, x, y) {
    const node = nodes.find(n => n.id === id);
    const children = nodes.filter(n => n.parentId === id);
    const totalW = subtreeWidth(id);
    node.x = Math.round(x + totalW / 2 - NODE_W / 2);
    node.y = y;
    let cx = x;
    children.forEach(c => {
      const cw = subtreeWidth(c.id);
      place(c.id, cx, y + VGAP + 60);
      cx += cw + HGAP;
    });
  }

  let xCursor = 60;
  roots.forEach(r => {
    const w = subtreeWidth(r.id);
    place(r.id, xCursor, 60);
    xCursor += w + 80;
  });

  render();
}

// EXPORT PNG
function exportPNG() {
  const bounds = { w: parseInt(canvas.style.width)||400, h: parseInt(canvas.style.height)||400 };
  const prevZoom = zoom; zoom = 1; applyZoom();

  import('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js').then(() => {
    html2canvas(canvas, { backgroundColor: '#f5f5f3', scale: 2, width: bounds.w, height: bounds.h }).then(c => {
      const a = document.createElement('a');
      a.href = c.toDataURL();
      a.download = (document.getElementById('chart-title-input').value || 'orgchart') + '.png';
      a.click();
      zoom = prevZoom; applyZoom();
    });
  }).catch(() => {
    alert('PNG export requires html2canvas. Try Save (JSON) instead.');
    zoom = prevZoom; applyZoom();
  });
}

// SAVE / LOAD JSON
function saveJSON() {
  const data = JSON.stringify({
    title: document.getElementById('chart-title-input').value,
    nodes, nodeCounter, callouts, calloutCounter
  }, null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(data);
  a.download = (document.getElementById('chart-title-input').value || 'orgchart') + '.json';
  a.click();
}

function loadJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      nodes = data.nodes || [];
      nodeCounter = data.nodeCounter || nodes.length;
      callouts = data.callouts || [];
      calloutCounter = data.calloutCounter || callouts.length;
      if (data.title) document.getElementById('chart-title-input').value = data.title;
      selected = null; selectedCallout = null;
      closePanel();
      render();
      renderCallouts();
    } catch { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Rubber-band select / click-to-deselect on canvas
document.getElementById('canvas-wrap').addEventListener('mousedown', e => {
  if (e.target === document.getElementById('canvas-wrap') || e.target === canvas || e.target === svg) {
    e.preventDefault();
    startRubberBand(e);
  }
});

render();
renderCallouts();
</script>
</body>
